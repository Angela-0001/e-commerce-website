Outputs:

  ApiGatewayUrl:
    Description: API Gateway base URL
    Value: !Sub https://${ShopEaseApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/v1
    Export:
      Name: !Sub shopease-${Stage}-ApiGatewayUrl

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub shopease-${Stage}-CognitoUserPoolId

  CognitoAppClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoAppClient
    Export:
      Name: !Sub shopease-${Stage}-CognitoAppClientId

  ProductImagesBucketName:
    Description: S3 bucket name for product images
    Value: !Ref ProductImagesBucket
    Export:
      Name: !Sub shopease-${Stage}-ProductImagesBucketName

  FrontendBucketName:
    Description: S3 bucket name for static frontend
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub shopease-${Stage}-FrontendBucketName

  FrontendWebsiteUrl:
    Description: Static website URL for the frontend bucket
    Value: !GetAtt FrontendBucket.WebsiteURL
    Export:
      Name: !Sub shopease-${Stage}-FrontendWebsiteUrl
